name: Publish to npm

on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      package:
        description: 'Package to publish (e.g. core, plugin-bagsfm, or "all")'
        required: true
        default: 'all'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Publish all packages
        if: github.event.inputs.package == 'all' || github.event_name == 'release'
        run: |
          pnpm -r --filter=./packages/** publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish single package
        if: github.event.inputs.package != 'all' && github.event_name == 'workflow_dispatch'
        run: |
          PKG=${{ github.event.inputs.package }}
          if [ -d "packages/$PKG" ]; then
            cd packages/$PKG && pnpm publish --access public --no-git-checks
          elif [ -d "packages/plugins/$PKG" ]; then
            cd packages/plugins/$PKG && pnpm publish --access public --no-git-checks
          else
            echo "Package not found: $PKG"
            exit 1
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
