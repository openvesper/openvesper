name: Docker Image

# Builds + publishes the OpenVesper Docker image to GitHub Container Registry
# (ghcr.io/openvesper/openvesper) on:
#   - every push to main          → tag: main
#   - every release tag (v*.*.*)  → tags: <version>, <major.minor>, latest
#   - manual workflow_dispatch
#
# Multi-arch: amd64 + arm64 (built with buildx + QEMU).
#
# Pulls require no auth for public images:
#   docker pull ghcr.io/openvesper/openvesper:latest

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to build (default: HEAD)"
        required: false
        default: ""

permissions:
  contents: read
  packages: write    # Required to push to GHCR

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: openvesper/openvesper

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      # Multi-arch: enable QEMU + buildx
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract tags + labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # Tag scheme:
          #   - 'main' for main branch pushes
          #   - '1.16.0' + '1.16' + 'latest' for release tags
          #   - '<sha>' (short) always
          tags: |
            type=raw,value=main,enable=${{ github.ref == 'refs/heads/main' }}
            type=semver,pattern={{version}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=sha,format=short
          labels: |
            org.opencontainers.image.title=OpenVesper
            org.opencontainers.image.description=Local-first AI agent framework with persistent gateway
            org.opencontainers.image.licenses=MIT
            org.opencontainers.image.source=https://github.com/openvesper/openvesper
            org.opencontainers.image.documentation=https://github.com/openvesper/openvesper#readme

      - name: Build and push (multi-arch)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Use GitHub Actions cache for faster rebuilds
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "## Image published 🌒" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Pull with one of:" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" | while read tag; do
            echo "docker pull $tag"
          done >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  # Smoke test: pull the image we just built and verify the gateway boots
  smoke-test:
    needs: build-and-push
    runs-on: ubuntu-latest
    # Only smoke-test on main pushes and tags; skip on workflow_dispatch
    # to keep manual runs fast.
    if: github.event_name != 'workflow_dispatch'

    steps:
      - name: Determine image tag
        id: tag
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "tag=latest" >> $GITHUB_OUTPUT
          else
            echo "tag=main" >> $GITHUB_OUTPUT
          fi

      - name: Pull image
        run: docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}

      - name: Start container
        run: |
          docker run -d \
            --name ov-smoke \
            -p 18789:18789 \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}

      - name: Wait for gateway /health
        run: |
          for i in {1..30}; do
            if curl -sf http://127.0.0.1:18789/health > /dev/null; then
              echo "✓ Gateway answered /health"
              curl -s http://127.0.0.1:18789/health | head -c 200
              echo ""
              exit 0
            fi
            sleep 2
          done
          echo "✗ Gateway did not answer /health within 60s"
          docker logs ov-smoke | tail -30
          exit 1

      - name: Stop container
        if: always()
        run: docker rm -f ov-smoke || true
